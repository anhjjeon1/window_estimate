    <style>
        :root { 
            --primary-dark: #1A237E; /* 로얄 네이비 */

        body {

        header {

        }
        .logo-clipart { 
            width: 38px; height: 38px; 
            background: rgba(255,255,255,0.2); border-radius: 50%; padding: 3px;

            object-fit: contain; backdrop-filter: blur(4px);
        }
        .main-title { margin: 0; font-size: 18px; font-weight: 800; color: white; letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; padding-top: 80px; padding-bottom: 100px; }

        .intro-disclaimer {
            background: #ffffff;

        select, input[type="number"] {

        .trust-notice {

        .g-bar-bg { flex: 1; height: 24px; background: #eceff1; border-radius: 12px; overflow: visible; position: relative; } /* position relative 추가 */

        .g-price { width: 85px; text-align: right; font-weight: 800; color: #263238; font-size: 14px; margin-left: 8px; }
        
        /* [수정] 배지 위치 상단 이동 */
        .badge-best { 
            position: absolute; right: -5px; top: -18px; /* -10px 에서 -18px로 더 올림 */
            background: #d50000; color: white; font-size: 10px; padding: 2px 8px;

        .d-title { font-size: 16px; font-weight: 800; margin: 40px 0 15px 0; display: flex; align-items: center; gap: 8px; color: #37474f; }

<body>

<div class="container" id="captureArea">

        <button class="btn-main btn-save" onclick="saveAsImage()">📸 결과 화면 저장</button>
    </div>

    <div class="company-grid" id="companyGrid">
        <div style="grid-column: span 2; text-align:center; padding:20px; color:#999; font-size:13px;">
            제휴 업체 정보를 불러오는 중...

    </div>

    <div class="chart-box" id="resultSection" style="display:none;">
        <div class="chart-header">📊 업체별 최종 견적 비교</div>
        
        <div id="resultAddressDisplay" style="text-align:center; font-weight:bold; color:#1565C0; margin-bottom:25px; font-size:15px; line-height:1.4;"></div>
        
        <div class="trust-notice">
            <strong>※ 견적 안내 사항</strong><br>
            • <strong>포함:</strong> 창호 자재비, 표준 시공비<br>
            • <strong>불포함(현장별도):</strong> 철거비, 사다리차, 마감비<br>
            * 최종금액은 무료방문 실측시 정확히 안내드립니다.
        </div>

        <div id="graphContainer"></div>

</div>

<footer>

</footer>

<script>
    const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_0fzDiPb7o94pN5PFBWfYpEcm7hqBhUT2Q1RyWqH78WdEnu4rdRSajOi7KN_bVnDUlaXk7TznbJ7o/pub?gid=560833598&single=true&output=csv";

    let companyDB = {};

    const companyPhoneMap = {
        "KCC(에스터)": "010-7166-8983",
        "KCC(위니드)": "010-2159-5911",
        "LX(거창)": "010-4664-8282",
        "LX(위니드)": "010-2159-5911",
        "LX(신창)": "010-2616-8014",
        "현대(위니드)": "010-2159-5911"
    };

    async function fetchPriceData() {
        try {
            const response = await fetch(GOOGLE_SHEET_CSV_URL);
            if (!response.ok) throw new Error("네트워크 오류");
            const text = await response.text();
            parseCSV(text);
        } catch (error) {
            console.error("로딩 실패:", error);
            document.getElementById('companyGrid').innerHTML = "<div style='grid-column: span 2; text-align:center; padding:20px;'>업체 정보를 불러오지 못했습니다.</div>";
        }
    }

    function parseSmartCSV(text) {
        const rows = [];
        let currentRow = [];
        let currentCell = '';
        let insideQuotes = false;
        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const nextChar = text[i + 1];
            if (char === '"') {
                if (insideQuotes && nextChar === '"') { currentCell += '"'; i++; }
                else { insideQuotes = !insideQuotes; }
            } else if (char === ',' && !insideQuotes) {
                currentRow.push(currentCell.trim()); currentCell = '';
            } else if ((char === '\r' || char === '\n') && !insideQuotes) {
                if (char === '\r' && nextChar === '\n') i++;
                if (currentCell || currentRow.length > 0) currentRow.push(currentCell.trim());
                if (currentRow.length > 0) rows.push(currentRow);
                currentRow = []; currentCell = '';
            } else { currentCell += char; }
        }
        if (currentCell || currentRow.length > 0) { currentRow.push(currentCell.trim()); rows.push(currentRow); }
        return rows;
    }

    function parseCSV(csvText) {
        const rows = parseSmartCSV(csvText);
        const newDB = {};
        
        rows.forEach((row, index) => {
            if (index === 0) return; 
            if (row.length < 5) return; 

            const code = row[0];        
            const comp = row[2];        
            const itemName = row[5] || ""; 
            const itemSpec = row[6] || ""; 
            
            let priceRaw = row[8] || "0"; 
            priceRaw = priceRaw.replace(/,/g, '').replace(/"/g, '');
            const price = parseInt(priceRaw);

            if (code && comp && !isNaN(price)) {
                if (!newDB[comp]) newDB[comp] = { name: comp, specs: {} };
                newDB[comp].specs[code] = { price: price, name: itemName, desc: itemSpec };
            }
        });

        if (Object.keys(newDB).length > 0) {
            companyDB = newDB;
            console.log("✅ 단가표 연동 완료");
            renderInitialButtons(); 
        }
    }
    
    function callCompany(compName) {
        const phone = companyPhoneMap[compName];
        if (phone) {
            if(confirm(`'${compName}' 담당자에게 연결하시겠습니까?\n(📞 ${phone})`)) {
                window.location.href = `tel:${phone}`;
            }
        } else {
            alert("해당 업체의 전화번호 정보가 없습니다.");
        }
    }

    function renderInitialButtons() {
        const grid = document.getElementById('companyGrid');
        grid.innerHTML = ""; 
        const companies = Object.keys(companyDB);
        
        companies.forEach((compName, idx) => {
            const colorIdx = (idx % 6) + 1;
            grid.innerHTML += `
                <button class="comp-btn cb-${colorIdx}" onclick="callCompany('${compName}')">
                    <span>${compName}</span>
                    <span class="phone-icon">📞</span>
                </button>
            `;
        });
    }

    fetchPriceData();

    function openAddressSearch() {
        new daum.Postcode({
            oncomplete: function(data) {
                var addr = data.roadAddress || data.jibunAddress;
                if(data.buildingName) addr += " (" + data.buildingName + ")";
                document.getElementById("aptAddress").value = addr;
            }
        }).open();
    }

    const defaultLocations = [
        "거실", "안방", "침실1", "침실2", "침실3", "침실4", 
        "발코니1", "발코니2", "세탁실", "주방", "중문"
    ];
    
    const inputArea = document.getElementById('inputListArea');
    const windowOptions = `
        <option value="S_IN">단창내부용</option>
        <option value="S_BAL">단창외부용</option>
        <option value="D_IN">이중창내부용</option>
        <option value="D_EXT">이중창외부용</option>
        <option value="SYS">분합창내부용</option>
        <option value="TURNING">중문</option>
        <option value="PJ">루버창</option>
    `;

    defaultLocations.forEach((loc, index) => {
        let defaultType = "D_IN";
        if (loc.includes("중문")) defaultType = "TURNING";
        else if (loc.includes("발코니") || loc.includes("세탁실")) defaultType = "S_BAL";
        else if (loc.includes("거실")) defaultType = "S_BAL";
        
        const currentOptions = windowOptions.replace(`value="${defaultType}"`, `value="${defaultType}" selected`);

        const locSelectOptions = defaultLocations.map(opt => 
            `<option value="${opt}" ${opt === loc ? 'selected' : ''}>${opt}</option>`
        ).join('');

        const html = `
            <div class="input-card">
                <div class="loading-overlay" id="loading_${index}">
                    <div class="spinner"></div>
                    <span style="font-size:11px; margin-top:5px; font-weight:bold;">AI 분석중..</span>
                </div>
                <div class="photo-area">
                    <div class="camera-icon" id="icon_${index}">📷</div>
                    <div class="photo-hint" id="hint_${index}">사진촬영<br>(A4부착)</div>
                    <img id="preview_${index}">
                    <input type="file" accept="image/*" class="photo-input-hidden" onchange="window.handleImageUpload(this, ${index})">
                </div>
                <div class="dim-area">
                    <div class="row-head">
                        <div>
                            <span class="row-number">No.${index + 1}</span>
                            <select id="loc_${index}" class="loc-select" onchange="autoSelectType(this, ${index})">
                                ${locSelectOptions}
                            </select>
                        </div>
                        <div class="badge-ai" id="badge_${index}">완료</div>
                    </div>
                    <select id="type_${index}">${currentOptions}</select>
                    <div class="size-inputs">
                        <input type="number" id="w_${index}" placeholder="가로 mm" inputmode="numeric">
                        <input type="number" id="h_${index}" placeholder="세로 mm" inputmode="numeric">
                    </div>
                </div>
            </div>
        `;
        inputArea.innerHTML += html;
    });

    window.autoSelectType = function(selectElem, index) {
        const loc = selectElem.value;
        const typeSelect = document.getElementById(`type_${index}`);
        
        if(loc.includes("중문")) typeSelect.value = "TURNING";
        else if(loc.includes("발코니") || loc.includes("세탁실")) typeSelect.value = "S_BAL";
        else if(loc.includes("거실")) typeSelect.value = "S_BAL"; 
        else typeSelect.value = "D_IN"; 
    };

    function calculateEstimates() {
        const resType = document.getElementById("residenceType").value;
        const pyeong = document.getElementById("pyeongSize").value;

        if(!resType) { alert("주거 형태를 선택해주세요."); document.getElementById("residenceType").focus(); return; }
        if(!pyeong) { alert("평형대를 선택해주세요."); document.getElementById("pyeongSize").focus(); return; }

        let hasData = false;
        let reqList = [];

        const fullAddr = document.getElementById('aptAddress').value + " " + document.getElementById('detailAddress').value;
        const addrDisplay = document.getElementById('resultAddressDisplay');
        
        if(fullAddr.trim().length > 1) {
            const resText = document.getElementById("residenceType").options[document.getElementById("residenceType").selectedIndex].text;
            const pyeongText = document.getElementById("pyeongSize").options[document.getElementById("pyeongSize").selectedIndex].text;
            addrDisplay.innerHTML = `📍 ${fullAddr}<br><span style="font-size:14px; color:#555; font-weight:normal;">[${resText} / ${pyeongText}]</span>`;
        }

        for(let i=0; i<11; i++) { 
            const w = parseFloat(document.getElementById(`w_${i}`).value) || 0;
            const h = parseFloat(document.getElementById(`h_${i}`).value) || 0;
            const type = document.getElementById(`type_${i}`).value;
            const locName = document.getElementById(`loc_${i}`).value;

            if (w > 0 && h > 0) {
                let qty = (type === "TURNING") ? 1 : (w * h) / 90000;
                reqList.push({ loc: locName, type: type, w: w, h: h, qty: qty });
                hasData = true;
            }
        }

        if (!hasData) { alert("최소 1개 이상의 창호 치수를 입력해주세요."); return; }
        if (Object.keys(companyDB).length === 0) { alert("❌ 견적 데이터 로딩 실패. 잠시 후 다시 시도해주세요."); return; }

        let results = [];
        for (const [compName, data] of Object.entries(companyDB)) {
            let sum = 0;
            reqList.forEach(item => {
                const specData = data.specs[item.type];
                if (specData) {
                    sum += specData.price * item.qty;
                }
            });
            if (sum > 0) results.push({ name: compName, cost: Math.floor(sum) });
        }

        const resultBox = document.getElementById('resultSection');
        const container = document.getElementById('graphContainer');
        const companyGrid = document.getElementById('companyGrid'); 
        const detailContainer = document.getElementById('detailTableContainer');
        
        resultBox.style.display = 'block';
        container.innerHTML = "";
        companyGrid.innerHTML = ""; 

        results.sort((a, b) => a.cost - b.cost);
        
        if(results.length > 0) {
            const maxCost = results[results.length - 1].cost;
            let btnHtml = ""; 

            results.forEach((item, idx) => {
                const percent = (item.cost / maxCost) * 100;
                const barClass = idx === 0 ? 'g-bar best' : (idx === 1 ? 'g-bar second' : 'g-bar');
                
                let badge = "";
                if(idx === 0) badge = "<div class='badge-best'>최저가</div>";

                container.innerHTML += `
                    <div class="graph-row">
                        <div class="g-label">${item.name}</div>
                        <div class="g-bar-bg">
                            <div class="${barClass}" style="width:${percent}%"></div>
                            ${badge}
                        </div>
                        <div class="g-price">${(item.cost/10000).toFixed(0)}만원</div>
                    </div>`;
                
                const colorIdx = (idx % 6) + 1;
                btnHtml += `
                    <button class="comp-btn cb-${colorIdx}" onclick="callCompany('${item.name}')">
                        <span>${item.name}</span>
                        <span class="phone-icon">📞</span>
                    </button>
                `;
            });
            
            companyGrid.innerHTML = btnHtml;

            let allDetailsHtml = "";
            results.forEach(companyRes => {
                const compName = companyRes.name;
                const compData = companyDB[compName];
                
                allDetailsHtml += `
                    <div class="d-title">📑 ${compName} 상세 견적서 <span style="font-size:12px; font-weight:normal; margin-left:auto;">(단위:원)</span></div>
                    <table class="d-table">
                        <thead>
                            <tr>
                                <th width="18%">위치</th>
                                <th width="25%">규격(mm)</th>
                                <th>스펙</th>
                                <th width="22%">금액</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                let totalSum = 0;
                reqList.forEach(item => {
                    const specInfo = compData.specs[item.type];
                    let price = 0;
                    let specText = "-";
                    
                    if (specInfo) {
                        price = Math.floor(specInfo.price * item.qty);
                        specText = specInfo.name;
                    } else {
                        specText = "<span style='color:#d32f2f;'>단가없음</span>";
                    }
                    
                    allDetailsHtml += `
                        <tr>
                            <td>${item.loc}</td>
                            <td>${item.w} x ${item.h}</td>
                            <td class="left">${specText}</td>
                            <td style="font-weight:700;">${price.toLocaleString()}</td>
                        </tr>
                    `;
                    totalSum += price;
                });
                
                allDetailsHtml += `
                            <tr class="total-row">
                                <td colspan="3">총 견적 합계</td>
                                <td class="total-price">${totalSum.toLocaleString()}</td>
                            </tr>
                        </tbody>
                    </table>
                `;
            });

            allDetailsHtml += `
                <div class="estimate-note">
                    ※ 위 견적은 인공지능(AI) 기반의 예상견적입니다. 정확한 금액은 현장실측 및 옵션선택에 따라 달라질 수 있습니다.
                </div>
            `;

            detailContainer.innerHTML = allDetailsHtml;

        } else {
            container.innerHTML += "<div style='text-align:center; padding:20px;'>산출된 견적 데이터가 없습니다.</div>";
        }
        
        resultBox.scrollIntoView({behavior: "smooth", block: "start"});
    }

    function saveAsImage() {
        window.scrollTo(0,0);
        setTimeout(() => {
            html2canvas(document.querySelector("#captureArea"), {scale: 2}).then(canvas => {
                const link = document.createElement('a');
                link.download = '청개구리_전문견적서.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }, 300);
    }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const p1 = "AIzaSyAq7G2mE2qFuUi";
    const p2 = "f-";
    const p3 = "PgPDsXl1ppbY5_JK54";
    const API_KEY = p1 + p2 + p3;

    window.handleImageUpload = async function(inputElement, index) {
        const file = inputElement.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById(`icon_${index}`).style.display = 'none';
            document.getElementById(`hint_${index}`).style.display = 'none';
            const img = document.getElementById(`preview_${index}`);
            img.src = e.target.result;
            img.style.display = 'block';
        }
        reader.readAsDataURL(file);

        const loading = document.getElementById(`loading_${index}`);
        loading.style.display = 'flex';

        try {
            const genAI = new GoogleGenerativeAI(API_KEY);
            const model = genAI.getGenerativeModel({ model: "gemini-2.0-flash-exp" });
            
            const imagePart = await fileToGenerativePart(file);
            const locationName = document.getElementById(`loc_${index}`).value;
            
            let parts = [imagePart];
            
            let prompt = `
                당신은 창호 견적 전문가입니다. 사진을 보고 다음 작업을 수행하세요.
                
                1. 창호의 종류를 시각적으로 판단하세요.
                   - 레일이 1개면 '단창'
                   - 레일이 2개면 '이중창'
                   - 거실에서 베란다로 나가는 큰 창은 '단창외부용' 또는 '분합창'일 가능성이 높음.
                   - 방문 형태나 중문처럼 보이면 '중문'
                2. 사진 속 **${locationName}** 창문의 전체 프레임 크기(mm)를 A4용지(210x297mm) 기준으로 계산하세요.
                
                반드시 아래 JSON 형식으로만 응답하세요:
                {
                    "typeCode": "문자열 (S_IN, S_BAL, D_IN, D_EXT, SYS, TURNING, PJ 중 가장 적절한 것 하나)",
                    "width": 숫자 (mm),
                    "height": 숫자 (mm)
                }
            `;
            
            parts.unshift(prompt);

            const result = await model.generateContent(parts);
            const response = await result.response;
            const text = response.text().replace(/```json|```/g, "").trim();
            const data = JSON.parse(text);

            if(data.typeCode) document.getElementById(`type_${index}`).value = data.typeCode;
            if(data.width) document.getElementById(`w_${index}`).value = data.width;
            if(data.height) document.getElementById(`h_${index}`).value = data.height;
            document.getElementById(`badge_${index}`).style.display = 'block';

        } catch (error) {
            console.error(error);
            alert("AI 분석에 실패했습니다. 치수를 직접 입력해주세요.");
        } finally {
            loading.style.display = 'none';
        }
    };

    async function fileToGenerativePart(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => {
                const base64Data = reader.result.split(',')[1];
                resolve({ inlineData: { data: base64Data, mimeType: file.type } });
            };
            reader.readAsDataURL(file);
        });
    }
</script>
